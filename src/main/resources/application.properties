spring.application.name=todolist

# Configuración de Base de Datos (USANDO VARIABLES)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/todolist_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Correo (SEGURIDAD)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=todolistgjv64177@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=ToDo List Support <todolistgjv64177@gmail.com>

# HIKARI
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000