<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title>Recuperar Contraseña - ToDo List</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
</head>
<body class="font-sans antialiased bg-blue-50 dark:bg-slate-950 h-dvh flex items-center justify-center text-slate-900 dark:text-white">
<img th:src="@{/assets/wall-login.webp}" class="w-full h-dvh absolute top-0 left-0 -z-10" alt="">
<div class="w-full h-dvh absolute top-0 left-0 -z-10 backdrop-blur-sm dark:backdrop-brightness-50 dark:backdrop-contrast-150"></div>

<section class="container m-auto w-[min(450px,90vw)] shadow-2xl h-auto rounded-2xl bg-white dark:bg-slate-800 flex flex-col items-center justify-center overflow-hidden">
    <div class="mt-8 bg-indigo-100 dark:bg-slate-700 p-3.5 rounded-full">
        <svg class="size-10 fill-indigo-600 dark:fill-indigo-400">
            <use th:href="@{/assets/login.svg#login}"></use>
        </svg>
    </div>

    <div class="p-6 pt-4 text-center">
        <h1 class="text-2xl font-bold text-indigo-600 dark:text-indigo-400 mb-1">RECUPERAR</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Introduce tu email para restablecer la contraseña</p>
    </div>

    <div id="forgot-alert" class="hidden mx-8 mb-4 p-3 rounded-xl text-sm text-center font-medium transition-all"></div>

    <form id="forgot-form" class="flex flex-col items-stretch w-full px-8 pb-8 gap-4 caret-indigo-600">
        <div class="flex flex-col gap-1">
            <label for="email" class="text-sm font-medium ml-1">Correo Electrónico</label>
            <input class="w-full border border-gray-300 dark:border-slate-600 rounded-xl px-3 py-3 bg-gray-50 dark:bg-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all"
                   type="email" name="email" id="email" placeholder="Ej: email@ejemplo.com" required>
        </div>

        <button class="bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 active:scale-95 transition-all mt-2" type="submit">
            Enviar instrucciones
        </button>

        <a th:href="@{/login}" class="text-center text-sm text-indigo-600 dark:text-indigo-400 hover:underline mt-2">Volver al Login</a>
    </form>
</section>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
