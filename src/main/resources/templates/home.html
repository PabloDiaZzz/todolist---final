<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - ToDoList</title>
    <link rel="stylesheet" th:href="@{/css/tailwind.css}">
</head>

<body
    class="font-sans antialiased bg-gray-100 dark:bg-slate-900 m-0 flex flex-col items-center overflow-x-hidden min-h-screen">
    <header class="bg-white dark:bg-slate-800 w-full py-4 shadow-md dark:shadow-lg">
        <div class="flex items-center justify-between gap-2 xl:max-w-327.5 max-w-250 w-full mx-auto px-3">
            <div class="flex flex-col gap-2">
                <h1 class="text-indigo-600 dark:text-indigo-400 font-semibold text-2xl">Aplicación ToDo List</h1>
                <p th:text="${user.fullName}" class="text-gray-600 dark:text-gray-400 font-semibold"></p>
            </div>

            <div class="flex items-center gap-3">
                <a th:if="${user.role == 'ROLE_ADMIN'}" th:href="@{/admin}"
                    class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 dark:bg-indigo-900/50 dark:text-indigo-300 dark:hover:bg-indigo-800 font-bold py-2 px-4 rounded-xl transition-colors cursor-pointer text-sm">
                    Panel Admin
                </a>

                <form th:action="@{/logout}" method="post">
                    <button
                        class="text-gray-600 dark:text-gray-400 text-sm md:text-lg flex gap-2 items-center hover:bg-gray-100 dark:hover:bg-slate-700 px-3 py-2 rounded-xl transition-colors cursor-pointer"
                        type="submit">
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main class="w-full max-w-2xl mx-auto mt-8 px-4 flex flex-col gap-8 pb-10">

        <section
            class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-md border border-gray-200 dark:border-slate-700">
            <h2 class="text-xl font-bold text-indigo-600 dark:text-indigo-400 mb-4">Nueva Tarea</h2>
            <form th:action="@{/tasks/create}" method="post" class="flex flex-col gap-3">
                <input type="text" name="title" placeholder="¿Qué necesitas hacer?" required
                    class="w-full border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-3 bg-gray-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                <textarea name="description" placeholder="Detalles (opcional)..."
                    class="w-full border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-3 bg-gray-50 dark:bg-slate-900 dark:text-white focus:ring-2 focus:ring-indigo-500 outline-none resize-none h-20"></textarea>

                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex gap-4 w-full">
                        <select name="categoryId"
                            class="border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-2 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none w-1/3">
                            <option value="">- Sin Categoría -</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.title}"></option>
                        </select>

                        <input type="text" name="tagsInput" autocomplete="off" placeholder="Tags (ej: urgente, compras)"
                            class="w-2/3 border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-2 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>

                <button type="submit"
                    class="bg-indigo-600 text-white font-bold py-2.5 px-6 rounded-xl hover:bg-indigo-700 w-full sm:w-fit sm:self-end transition-colors cursor-pointer mt-2">
                    Añadir Tarea
                </button>
            </form>
        </section>

        <section class="flex flex-col gap-4">

            <div th:if="${#lists.isEmpty(tasks)}" class="text-center text-gray-500 dark:text-gray-400 py-8">
                No tienes tareas. ¡Añade una para empezar!
            </div>

            <article th:each="task : ${tasks}" th:data-id="${task.id}" th:data-title="${task.title}"
                th:data-description="${task.description}"
                th:data-category="${task.category != null ? task.category.id : ''}"
                th:data-tags="${#strings.listJoin(task.tags.![name], ', ')}"
                class="task-item bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 flex justify-between gap-4 items-start transition-all"
                th:classappend="${task.completed ? 'opacity-75' : ''}">

                <div class="flex gap-4 items-start w-full">
                    <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="post">
                        <button type="submit" class="mt-1 cursor-pointer">
                            <div th:if="${task.completed}"
                                class="size-6 bg-green-500 rounded-full flex items-center justify-center">
                                <span class="text-white text-sm font-bold">✓</span>
                            </div>
                            <div th:unless="${task.completed}"
                                class="size-6 rounded-full border-2 border-gray-400 dark:border-gray-500 hover:border-indigo-500">
                            </div>
                        </button>
                    </form>

                    <div class="flex flex-col flex-1"
                        th:classappend="${task.completed ? 'line-through text-gray-400 dark:text-gray-500' : 'text-gray-800 dark:text-gray-200'}">
                        <h3 class="font-bold text-lg leading-tight" th:text="${task.title}">Título</h3>
                        <p class="text-sm mt-1" th:if="${task.description != null and !task.description.isEmpty()}"
                            th:text="${task.description}"></p>

                        <div class="flex gap-2 mt-2 flex-wrap">
                            <span th:if="${task.category != null}" th:text="${task.category.title}"
                                class="text-xs font-semibold bg-indigo-100 text-indigo-800 dark:bg-indigo-900/50 dark:text-indigo-300 px-2.5 py-1 rounded-md"></span>
                            <span th:each="tag : ${task.tags}" th:text="${'#' + tag.name}"
                                class="text-xs bg-gray-100 text-gray-600 dark:bg-slate-700 dark:text-gray-300 px-2.5 py-1 rounded-md"></span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col gap-1 items-end">
                    <button type="button" onclick="abrirEditModal(this)"
                        class="text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-sm font-medium w-full text-center">Editar</button>
                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post">
                        <button type="submit"
                            class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-sm font-medium w-full text-center">Borrar</button>
                    </form>
                </div>
            </article>

        </section>
    </main>
    <dialog id="edit-modal"
        class="p-6 bg-white dark:bg-slate-800 rounded-2xl shadow-xl backdrop:bg-black/50 backdrop:backdrop-blur-sm m-auto w-[90%] max-w-lg border-none text-slate-900 dark:text-white open:flex flex-col gap-4">
        <h2 class="text-xl font-bold text-indigo-600 dark:text-indigo-400">Editar Tarea</h2>

        <form id="edit-form" method="post" class="flex flex-col gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <input type="text" name="title" id="edit-title" required
                class="w-full border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-2 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
            <textarea name="description" id="edit-desc"
                class="w-full border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-2 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500 resize-none h-20"></textarea>

            <div class="flex gap-4">
                <select name="categoryId" id="edit-category"
                    class="w-1/2 border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-2 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none">
                    <option value="">- Sin Categoría -</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.title}"></option>
                </select>
                <input type="text" autocomplete="off" name="tagsInput" id="edit-tags"
                    placeholder="Tags (ej: urgente, compras)"
                    class="w-2/3 border border-gray-300 dark:border-slate-600 rounded-xl px-4 py-2 bg-gray-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="flex gap-3 justify-end mt-4">
                <button type="button" onclick="document.getElementById('edit-modal').close()"
                    class="px-5 py-2 bg-gray-200 dark:bg-slate-700 hover:bg-gray-300 dark:hover:bg-slate-600 rounded-xl cursor-pointer transition">Cancelar</button>
                <button type="submit"
                    class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl cursor-pointer transition">Guardar</button>
            </div>
        </form>
    </dialog>

    <script>
        function abrirEditModal(btn) {
            const article = btn.closest('.task-item');
            const modal = document.getElementById('edit-modal');

            document.getElementById('edit-form').action = `/tasks/${article.dataset.id}/edit`;

            document.getElementById('edit-title').value = article.dataset.title;
            document.getElementById('edit-desc').value = article.dataset.description || '';
            document.getElementById('edit-category').value = article.dataset.category || '';
            document.getElementById('edit-tags').value = article.dataset.tags || '';

            const tagIds = article.dataset.tags ? article.dataset.tags.split(',') : [];
            document.querySelectorAll('.edit-tag-checkbox').forEach(cb => {
                cb.checked = tagIds.includes(cb.value);
            });

            modal.showModal();
        }
    </script>
</body>

</html>
