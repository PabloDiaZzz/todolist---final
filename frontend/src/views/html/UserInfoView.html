<div id="theme-wrapper"
    class="flex flex-col items-center bg-gray-200 dark:bg-slate-900 m-0 w-full min-h-screen overflow-x-hidden font-sans antialiased px-5">
    <header class="md:top-0 z-10 md:fixed bg-white dark:bg-slate-800 shadow-md dark:shadow-lg py-4 w-full">
        <div class="flex justify-between items-center gap-2 mx-auto px-3 w-full max-w-250 md:max-w-327.5">
            <div class="flex flex-col gap-2">
                <h1 class="text-2xl font-semibold text-blue-600 dark:text-indigo-400">Panel de Control (ADMIN)</h1>
                <p id="user-name" class="font-semibold text-gray-600 dark:text-gray-400"></p>
            </div>
            <div class="flex items-center gap-3">
                <button id="user-button" type="button" onclick="navigate('/')"
                    class="bg-blue-100 hover:bg-blue-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 px-4 py-2 rounded-xl font-bold text-blue-700 dark:text-indigo-300 text-sm transition-colors cursor-pointer">Panel
                    Usuario</button>

                <form id="logout-form">
                    <button
                        class="flex items-center gap-2 hover:bg-gray-200 dark:hover:bg-slate-700 px-3 py-2 rounded-xl text-gray-600 dark:text-gray-400 text-sm sm:text-lg transition-colors cursor-pointer"
                        type="submit">
                        <svg class="fill-gray-600 dark:fill-gray-400 size-5 rotate-180">
                            <use href="/login.svg#login"></use>
                        </svg>
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main
        class="w-full max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mt-8 pb-10 md:pt-20 text-black dark:text-white items-start">

    </main>
</div>
