<div id="theme-wrapper"
    class="flex flex-col items-center bg-gray-200 dark:bg-slate-900 m-0 w-full min-h-screen overflow-x-hidden font-sans antialiased">
    <header class="md:top-0 z-10 md:fixed bg-white dark:bg-slate-800 shadow-md dark:shadow-lg py-4 w-full">
        <div class="flex justify-between items-center gap-2 mx-auto px-3 w-full max-w-250 md:max-w-327.5">
            <div class="flex flex-col gap-2">
                <h1 class="font-semibold text-blue-600 dark:text-indigo-400 text-2xl">Panel de Control (ADMIN)</h1>
                <p id="user-name" class="font-semibold text-gray-600 dark:text-gray-400"></p>
            </div>
            <div class="flex items-center gap-3">
                <button id="admin-button" type="button" onclick="navigate('/admin')"
                    class="bg-blue-100 hover:bg-blue-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 px-4 py-2 rounded-xl font-bold text-blue-700 dark:text-indigo-300 text-sm transition-colors cursor-pointer">Panel
                    Admin</button>

                <form id="logout-form">
                    <button
                        class="flex items-center gap-2 hover:bg-gray-200 dark:hover:bg-slate-700 px-3 py-2 rounded-xl text-gray-600 dark:text-gray-400 text-sm sm:text-lg transition-colors cursor-pointer"
                        type="submit">
                        <svg class="fill-gray-600 dark:fill-gray-400 size-5 rotate-180">
                            <use href="/login.svg#login"></use>
                        </svg>
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main class="flex flex-col gap-4 mx-auto mt-8 px-4 md:pt-20 pb-10 w-full max-w-2xl">
        <section class="flex flex-col bg-back-secondary p-6 rounded-lg w-full gap-3">
            <div class="flex justify-between w-full">
                <h1 id="user-info-title" class="font-semibold text-color text-2xl"></h1>
                <svg class="fill-gray-600 dark:fill-gray-400 size-9 cursor-pointer hover:scale-103 transition-all hover:bg-gray-200 p-2 rounded-full">
                    <use href="/main.svg#edit"></use>
                </svg>
            </div>
            <p id="user-info-fullname" class="font-medium text-gray-600 dark:text-gray-400 text-sm"></p>
            <p id="user-info-email" class="font-medium text-gray-600 dark:text-gray-400 text-sm"></p>

        </section>
        <section class="flex flex-col bg-back-secondary p-6 rounded-lg w-full gap-2" id="task-list">
        </section>

    </main>

    <dialog id="task-info"
        class="bg-white dark:bg-slate-800 shadow-xl m-auto p-6 border-none rounded-2xl outline-none min-w-md">
        <div id="task-info-content" class="flex flex-col items-stretch gap-4">
            <div class="flex justify-between items-center">
                <h2 id="task-info-title"
                    class="self-center font-bold text-blue-500 dark:text-indigo-500 text-xl text-center whitespace-break-spaces">
                </h2>
                <svg
                    class="self-center bg-blue-200 dark:bg-indigo-900 fill-blue-500 dark:fill-indigo-500 -my-2 p-2 rounded-full size-12">
                    <use href="/main.svg#info"></use>
                </svg>

            </div>
            <pre id="task-info-desc"
                class="bg-gray-100 dark:bg-slate-900 p-2 border border-gray-300 dark:border-slate-600 rounded-xl max-w-125 font-sans dark:text-white whitespace-pre-wrap"></pre>
            <div class="info-field-['Fecha_limite:']">
                <p id="task-info-deadline"
                    class="bg-gray-100 dark:bg-slate-900 p-2 border border-gray-300 dark:border-slate-600 rounded-xl dark:text-white">
                </p>
            </div>
            <div class="flex flex-col justify-between gap-3">
                <div id="task-info-categories"></div>
                <div id="task-info-tags"></div>
            </div>
            <status-info id="task-info-status" type="pendiente"></status-info>
            <div class="info-field-['Fecha_de_creación:']">
                <p id="task-info-created-at"
                    class="bg-gray-100 dark:bg-slate-900 p-2 border border-gray-300 dark:border-slate-600 rounded-xl dark:text-white">
                </p>
            </div>
            <div
                class="bg-gray-100 dark:bg-slate-900 border border-gray-300 dark:border-slate-600 rounded-xl dark:text-white info-field-['Última_modificación:']">
                <p id="task-info-updated-at" class="p-2"></p>
            </div>
            <button id="close-task-info"
                class="self-stretch bg-red-500 p-2 rounded-xl outline-none text-white hover:scale-101 transition-all cursor-pointer item-stretch">Cerrar</button>
        </div>
    </dialog>
</div>
