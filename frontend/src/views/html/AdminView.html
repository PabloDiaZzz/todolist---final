<div id="theme-wrapper"
    class="flex flex-col items-center bg-gray-200 dark:bg-slate-900 m-0 w-full min-h-screen overflow-x-hidden font-sans antialiased">
    <header class="md:top-0 z-10 md:fixed bg-white dark:bg-slate-800 shadow-md dark:shadow-lg py-4 w-full">
        <div class="flex justify-between items-center gap-2 mx-auto px-3 w-full max-w-250 md:max-w-327.5">
            <div class="flex flex-col gap-2">
                <h1 class="text-2xl font-semibold text-blue-600 dark:text-indigo-400">Panel de Control (ADMIN)</h1>
                <p id="user-name" class="font-semibold text-gray-600 dark:text-gray-400"></p>
            </div>
            <div class="flex items-center gap-3">
                <button id="user-button" type="button" onclick="navigate('/')"
                    class="bg-blue-100 hover:bg-blue-200 dark:bg-indigo-900/50 dark:hover:bg-indigo-800 px-4 py-2 rounded-xl font-bold text-blue-700 dark:text-indigo-300 text-sm transition-colors cursor-pointer">Panel
                    Usuario</button>

                <form id="logout-form">
                    <button
                        class="flex items-center gap-2 hover:bg-gray-200 dark:hover:bg-slate-700 px-3 py-2 rounded-xl text-gray-600 dark:text-gray-400 text-sm sm:text-lg transition-colors cursor-pointer"
                        type="submit">
                        <svg class="fill-gray-600 dark:fill-gray-400 size-5 rotate-180">
                            <use href="/login.svg#login"></use>
                        </svg>
                        Cerrar sesión
                    </button>
                </form>
            </div>
        </div>
    </header>

    <main
        class="w-full max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mt-8 pb-10 md:pt-20 text-black dark:text-white items-start">

        <section class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm flex flex-col max-h-[calc(100dvh-7.5rem)]">
            <h2
                class="text-xl font-bold border-b border-gray-200 dark:border-slate-700 pb-2 mb-4">
                Gestión de Usuarios
            </h2>
            
            <ul class="users-list flex flex-col gap-3 flex-1 overflow-y-auto pr-2 min-h-0 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-slate-600 scrollbar-track-transparent scrollbar-thumb-rounded-full"></ul>
            
            <div id="no-users"
                class="flex flex-col items-center justify-center py-4 text-gray-500 dark:text-gray-400 text-center gap-3">
                <svg class="size-12 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor"
                    stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
                </svg>
                <p class="font-medium text-sm">Parece que solo estás tú por aquí.</p>
            </div>
        </section>


        <section class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm flex flex-col max-h-[calc(100dvh-9.5rem)]">
            <h2 class="text-xl font-bold border-b border-gray-200 dark:border-slate-700 pb-2 mb-4">Gestión de Categorías
            </h2>

            <form id="create-cat-form" class="flex gap-2 mb-4 shrink-0">
                <input type="text" name="title" placeholder="Nueva categoría..." required
                    class="w-full border border-gray-300 dark:border-slate-600 rounded-lg px-3 py-2 bg-gray-50 dark:bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                <button type="submit"
                    class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition">Crear</button>
            </form>
            
            <div id="buscar-cat-container" data-active="false"
                class="shrink-0 group/search relative flex items-center bg-blue-600 dark:bg-indigo-600 hover:bg-blue-700 dark:hover:bg-indigo-700 text-white rounded-lg text-sm font-bold transition-all duration-750 mb-3 h-10 w-24 data-[active=true]:w-full cursor-pointer overflow-hidden data-[active=true]:bg-gray-300 dark:data-[active=true]:bg-slate-900">
                <div
                    class="absolute inset-0 flex items-center justify-center transition-all duration-750 opacity-100 group-data-[active=true]/search:opacity-0 pointer-events-none group-data-[active=true]/search:scale-y-0 group-data-[active=true]/search:scale-x-10">
                    Buscar
                    <svg class="size-4 ml-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text" id="buscar-cat-input" placeholder="Escribe para buscar..."
                    class="absolute inset-0 w-full h-full bg-transparent border-none outline-none px-4 text-white transition-all duration-750 delay-0 opacity-0 scale-90 group-data-[active=true]/search:opacity-100 group-data-[active=true]/search:scale-100 group-data-[active=true]/search:delay-200 pointer-events-none group-data-[active=true]/search:pointer-events-auto placeholder:font-medium">
            </div>

            <ul class="cats-list flex flex-col gap-2 flex-1 overflow-y-auto pr-2 min-h-0 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-slate-600 scrollbar-track-transparent scrollbar-thumb-rounded-full"></ul>
            
            <div id="no-cats"
                class="hidden flex-col items-center justify-center py-4 text-gray-500 dark:text-gray-400 text-center gap-3">
                <svg class="size-12 text-gray-300 dark:text-gray-600" fill="none" stroke="currentColor"
                    stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M3.75 6A2.25 2.25 0 001.5 8.25v10.5A2.25 2.25 0 003.75 21h16.5A2.25 2.25 0 0022.5 18.75V8.25A2.25 2.25 0 0020.25 6H3.75zm0 0a2.25 2.25 0 012.25-2.25h12.75A2.25 2.25 0 0120.25 6m-15.379-2.018L5.25 6.75m0 0l3.382-4.518" />
                </svg>
                <p class="font-medium text-sm">Parece que no hay categorías.</p>
            </div>
        </section>


        <section class="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm flex flex-col max-h-[calc(100dvh-7.5rem)]">
            <h2 class="text-xl font-bold border-b border-gray-200 dark:border-slate-700 pb-2 mb-4">Todas las Tareas</h2>
            
            <ul class="flex flex-col gap-3 flex-1 overflow-y-auto pr-2 min-h-0 scrollbar-thin scrollbar-thumb-gray-300 dark:scrollbar-thumb-slate-600 scrollbar-track-transparent scrollbar-thumb-rounded-full">
                <li
                    class="flex flex-col gap-2 bg-gray-50 dark:bg-slate-900 p-3 rounded-lg border border-gray-200 dark:border-slate-700">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-bold text-sm leading-tight"></p>
                            <p class="text-xs text-gray-500 mt-0.5">Autor: <span
                                    class="font-medium text-gray-700 dark:text-gray-300"></span></p>
                        </div>
                        <form>
                            <button type="submit"
                                class="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 px-2 py-1 rounded text-xs transition">Borrar</button>
                        </form>
                    </div>
                </li>
            </ul>
        </section>

    </main>
</div>
