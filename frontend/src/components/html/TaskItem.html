<article
    class="task-wrapper group bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 flex justify-between gap-4 items-stretch transition-all hover:shadow-sm">
    <div class="flex gap-4 items-start w-full">
        <div class="flex flex-col gap-4 items-center justify-between h-full">
            <button type="button" class="toggle-btn mt-1 cursor-pointer">
                <div
                    class="status-icon size-6 rounded-full border-2 border-gray-400 dark:border-gray-500 dark:hover:border-indigo-500 hover:border-blue-500 flex items-center justify-center">
                </div>
            </button>
            <svg class="info-btn bottom-5 left-5 size-5 text-gray-400 hover:text-blue-500 dark:hover:text-indigo-400 transition-all cursor-pointer opacity-0 group-hover:opacity-100"
                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                viewBox="0 0 24 24" id="info-icon">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 16v-4"></path>
                <path d="M12 8h.01"></path>
            </svg>
        </div>

        <div class="task-content flex flex-col flex-1 text-gray-800 dark:text-gray-200">
            <div class="flex gap-2 items-center">
                <h3 class="tittle-text font-bold text-lg leading-tight">{{title}}</h3>
                <span class="date-text text-yellow-600 dark:text-yellow-400 bg-yellow-200 dark:bg-yellow-800/50 px-2 py-0.5 rounded-2xl text-xs">{{date}}</span>
            </div>
            <p class="description-text text-sm mt-1">{{description}}</p>

            <div class="category-container flex gap-2 mt-2 flex-wrap">
            </div>
            <div class="tags-container flex gap-2 mt-2 flex-wrap">
            </div>
        </div>
    </div>

    <div class="flex flex-col items-end justify-between h-full self-center">
        <button type="button"
            class="edit-btn text-blue-500 hover:bg-blue-200 dark:hover:bg-blue-900/30 px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-sm font-medium w-full text-center">Editar</button>
        <button type="button" data-state="initial"
            class="delete-btn text-red-500 hover:bg-red-200 dark:hover:bg-red-900/30 px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-sm font-medium w-full text-center">Borrar</button>
    </div>
    <svg class="absolute bottom-5 left-5 size-5 text-gray-400 hover:text-blue-500 dark:hover:text-indigo-400 transition-colors cursor-pointer" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" id="info-icon">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 16v-4"></path>
        <path d="M12 8h.01"></path>
    </svg>
</article>
<template id="tag-template">
    <span class="text-xs bg-gray-300 text-gray-600 dark:bg-slate-700 dark:text-gray-300 px-2.5 py-1 rounded-md"></span>
</template>
<template id="category-template">
    <span
        class="text-xs font-semibold bg-blue-200 text-blue-800 dark:bg-indigo-900/50 dark:text-indigo-300 px-2.5 py-1 rounded-md"></span>
</template>
