<article
    class="task-wrapper bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 flex justify-between gap-4 items-stretch transition-all">
    <div class="flex gap-4 items-start w-full">
        <button type="button" class="toggle-btn mt-1 cursor-pointer">
            <div
                class="status-icon size-6 rounded-full border-2 border-gray-400 dark:border-gray-500 hover:border-indigo-500 flex items-center justify-center">
            </div>
        </button>

        <div class="task-content flex flex-col flex-1 text-gray-800 dark:text-gray-200">
            <h3 class="font-bold text-lg leading-tight">{{title}}</h3>
            <p class="description-text text-sm mt-1">{{description}}</p>

            <div class="category-container flex gap-2 mt-2 flex-wrap">
            </div>
            <div class="tags-container flex gap-2 mt-2 flex-wrap">
            </div>
        </div>
    </div>

    <div class="flex flex-col items-end justify-between h-full self-center">
        <button type="button"
            class="edit-btn text-blue-500 hover:bg-blue-200 dark:hover:bg-blue-900/30 px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-sm font-medium w-full text-center">Editar</button>
        <button type="button" data-state="initial"
            class="delete-btn text-red-500 hover:bg-red-200 dark:hover:bg-red-900/30 px-3 py-1.5 rounded-lg transition-colors cursor-pointer text-sm font-medium w-full text-center">Borrar</button>
    </div>
</article>
<template id="tag-template">
    <span class="text-xs bg-gray-300 text-gray-600 dark:bg-slate-700 dark:text-gray-300 px-2.5 py-1 rounded-md"></span>
</template>
<template id="category-template">
    <span
        class="text-xs font-semibold bg-blue-200 text-blue-800 dark:bg-indigo-900/50 dark:text-indigo-300 px-2.5 py-1 rounded-md"></span>
</template>
